version: '3.8'

services:
  # BBQ Benchmark App
  bbq-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bbq-benchmark-app
    ports:
      - "3000:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - bbq-network

  # Optional: Ollama service for local LLM evaluation
  # Uncomment this section if you want to run Ollama in Docker
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: bbq-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   restart: unless-stopped
  #   networks:
  #     - bbq-network

networks:
  bbq-network:
    driver: bridge

